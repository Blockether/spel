name: Allure Report

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: write

concurrency:
  group: allure-report
  cancel-in-progress: false

env:
  PAGES_BASE_URL: https://blockether.github.io/spel
  MAX_REPORTS: 15
  MAX_PR_REPORTS: 50

jobs:
  report:
    runs-on: ubuntu-latest
    if: >-
      (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure')
      && github.event.workflow_run.head_repository.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Download Allure results from CI
        id: download-results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results
          path: allure-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty results dir if download failed
        if: steps.download-results.outcome == 'failure'
        run: mkdir -p allure-results

      - name: Detect context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_EVENT="${{ github.event.workflow_run.event }}"
          echo "ci_event=$CI_EVENT" >> $GITHUB_OUTPUT
          # Default: not a PR, treat as main build
          echo "is_pr=false" >> $GITHUB_OUTPUT
          echo "is_main=$( [ "$CI_EVENT" = "push" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "ci_run_number=${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT
          echo "ci_run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "ci_passed=${{ github.event.workflow_run.conclusion == 'success' }}" >> $GITHUB_OUTPUT

          if [ "$CI_EVENT" = "pull_request" ]; then
            # Primary: use workflow_run.pull_requests (fast, no API call)
            PR_JSON='${{ toJSON(github.event.workflow_run.pull_requests) }}'
            PR_NUM=$(echo "$PR_JSON" | jq '.[0].number // empty')

            # Fallback: workflow_run.pull_requests is often empty (known GitHub limitation).
            # Use the head branch to find the associated PR via gh CLI.
            if [ -z "$PR_NUM" ]; then
              HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
              if [ -n "$HEAD_BRANCH" ]; then
                PR_NUM=$(gh pr list --head "$HEAD_BRANCH" --state all --json number --jq '.[0].number' 2>/dev/null || true)
                [ -z "$PR_NUM" ] && echo "::warning::PR detection fallback failed for branch $HEAD_BRANCH"
              fi
            fi

            if [ -n "$PR_NUM" ] && [ "$PR_NUM" != "null" ]; then
              PR_DATA=$(gh pr view "$PR_NUM" --json number,title,author,headRefName,headRefOid,url 2>/dev/null || echo '{}')
              if [ -n "$(echo "$PR_DATA" | jq -r '.number // empty')" ]; then
                # Only set is_pr=true if we have a valid PR
                echo "is_pr=true" >> $GITHUB_OUTPUT
                echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
                echo "pr_title=$(echo "$PR_DATA" | jq -r '.title // ""')" >> $GITHUB_OUTPUT
                PR_AUTHOR_LOGIN=$(echo "$PR_DATA" | jq -r '.author.login // ""')
                PR_AUTHOR_NAME=""
                if [ -n "$PR_AUTHOR_LOGIN" ]; then
                  PR_AUTHOR_NAME=$(gh api "users/$PR_AUTHOR_LOGIN" --jq '.name // ""' 2>/dev/null || echo "")
                fi
                echo "pr_author=${PR_AUTHOR_NAME:-$PR_AUTHOR_LOGIN}" >> $GITHUB_OUTPUT
                echo "pr_branch=$(echo "$PR_DATA" | jq -r '.headRefName // ""')" >> $GITHUB_OUTPUT
                echo "pr_sha=$(echo "$PR_DATA" | jq -r '.headRefOid // ""')" >> $GITHUB_OUTPUT
                echo "pr_url=$(echo "$PR_DATA" | jq -r '.url // ""')" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Detect commit info
        id: commit
        run: |
          SHA="${{ steps.ctx.outputs.head_sha }}"
          echo "message=$(git log -1 --format='%s' "$SHA" 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --format='%an' "$SHA" 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "timestamp=$(git log -1 --format='%aI' "$SHA" 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Restore Allure history
        if: steps.ctx.outputs.is_main == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .allure-history.jsonl
          key: allure-history-jsonl-${{ steps.ctx.outputs.ci_run_number }}
          restore-keys: allure-history-jsonl-

      - name: Detect version
        id: version
        run: |
          VERSION=$(cat resources/SPEL_VERSION 2>/dev/null || echo "unknown")
          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            echo "version=$TAG" >> $GITHUB_OUTPUT
            echo "badge=release" >> $GITHUB_OUTPUT
          else
            echo "version=v${VERSION}-candidate" >> $GITHUB_OUTPUT
            echo "badge=candidate" >> $GITHUB_OUTPUT
          fi

      - name: Generate combined Allure report
        env:
          LAZYTEST_ALLURE_LOGO: logo.svg
          LAZYTEST_ALLURE_REPORT_NAME: "#${{ steps.ctx.outputs.ci_run_number }} · ${{ steps.ctx.outputs.head_sha }} · ${{ steps.commit.outputs.author }} · ${{ steps.commit.outputs.message }}"
        run: |
          clojure -M -e "
            (require '[com.blockether.spel.allure-reporter :as r])
            (r/generate-html-report! \"allure-results\" \"allure-report\")"

      - name: Generate Blockether alternative report
        run: |
          clojure -M -e "
            (require '[com.blockether.spel.spel-allure-alternative-html-report :as alt])
            (alt/generate! \"allure-results\" \"allure-report/alternative\")"

      - name: Extract test counts from Allure results
        id: test-counts
        run: |
          PASSED=$(grep -l '"status": *"passed"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          FAILED=$(grep -l '"status": *"failed"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          BROKEN=$(grep -l '"status": *"broken"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          SKIPPED=$(grep -l '"status": *"skipped"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$((PASSED + FAILED + BROKEN + SKIPPED))
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Test counts: passed=$PASSED, failed=$FAILED, broken=$BROKEN, skipped=$SKIPPED, total=$TOTAL"

      # =========================================================================
      # PR: Deploy report to /pr/<number>/ on gh-pages (live hosted link)
      # =========================================================================

      - name: Comment PR with live report link
        if: steps.ctx.outputs.is_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = ${{ steps.ctx.outputs.pr_number }};
            const reportUrl = `https://blockether.github.io/spel/pr/${prNum}/`;
            const ciUrl = `${{ github.server_url }}/${{ github.repository }}/actions/workflows/ci.yml`;
            const ciConclusion = '${{ github.event.workflow_run.conclusion }}';
            const body = [
              `## 📊 Allure Report`,
              ``,
              `🔗 **[View Report](${reportUrl})**`,
              ``,
              `| Check | Status |`,
              `|-------|--------|`,
              `| CI | ${ciConclusion} |`,
              `| Tests | ${${{ steps.test-counts.outputs.failed }} + ${{ steps.test-counts.outputs.broken }} === 0 ? '✅ all passed' : '❌ failures detected'} |`,
              ``,
              `> CLI bash regression tests (~179 assertions) run separately in the [CI workflow](${ciUrl}).`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Allure Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

      - name: Build PR deploy with metadata
        if: steps.ctx.outputs.is_pr == 'true'
        env:
          PR_NUM: ${{ steps.ctx.outputs.pr_number }}
          PR_TITLE: ${{ steps.ctx.outputs.pr_title }}
          PR_BRANCH: ${{ steps.ctx.outputs.pr_branch }}
          PR_SHA: ${{ steps.ctx.outputs.pr_sha }}
          PR_AUTHOR: ${{ steps.ctx.outputs.pr_author }}
          TEST_PASSED: ${{ steps.ctx.outputs.ci_passed }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.ctx.outputs.ci_run_id }}
          TESTS_PASSED: ${{ steps.test-counts.outputs.passed }}
          TESTS_FAILED: ${{ steps.test-counts.outputs.failed }}
          TESTS_BROKEN: ${{ steps.test-counts.outputs.broken }}
          TESTS_SKIPPED: ${{ steps.test-counts.outputs.skipped }}
          TESTS_TOTAL: ${{ steps.test-counts.outputs.total }}
          RUN_NUMBER: ${{ steps.ctx.outputs.ci_run_number }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_BADGE: ${{ steps.version.outputs.badge }}
          MAX_PR_REPORTS: ${{ env.MAX_PR_REPORTS }}
          PR_URL: ${{ steps.ctx.outputs.pr_url }}
        run: |
          mkdir -p /tmp/pr-deploy/pr/${PR_NUM}
          cp -r allure-report/* /tmp/pr-deploy/pr/${PR_NUM}/
          curl -sSf "${PAGES_BASE_URL}/pr-builds.json" -o /tmp/pr-deploy/pr-builds.json 2>/dev/null || echo '[]' > /tmp/pr-deploy/pr-builds.json

          clojure -M -e "
            (require '[com.blockether.spel.ci :as ci])
            (ci/register-pr-build!
              {:site-dir       \"/tmp/pr-deploy\"
               :pr-number      (System/getenv \"PR_NUM\")
               :pr-title       (System/getenv \"PR_TITLE\")
               :branch         (System/getenv \"PR_BRANCH\")
               :sha            (System/getenv \"PR_SHA\")
               :author         (System/getenv \"PR_AUTHOR\")
               :run-number     (System/getenv \"RUN_NUMBER\")
               :run-url        (System/getenv \"RUN_URL\")
               :repo-url       (System/getenv \"REPO_URL\")
               :version        (System/getenv \"VERSION\")
               :version-badge  (System/getenv \"VERSION_BADGE\")
               :status         \"completed\"
               :tests-passed   (= \"true\" (System/getenv \"TEST_PASSED\"))
               :test-counts    {:passed  (parse-long (or (System/getenv \"TESTS_PASSED\") \"0\"))
                                :failed  (parse-long (or (System/getenv \"TESTS_FAILED\") \"0\"))
                                :broken  (parse-long (or (System/getenv \"TESTS_BROKEN\") \"0\"))
                                :skipped (parse-long (or (System/getenv \"TESTS_SKIPPED\") \"0\"))
                                :total   (parse-long (or (System/getenv \"TESTS_TOTAL\") \"0\"))}
               :max-pr-builds  (parse-long (or (System/getenv \"MAX_PR_REPORTS\") \"50\"))
               :pr-url         (System/getenv \"PR_URL\")})"

      - name: Deploy PR report to GitHub Pages
        if: steps.ctx.outputs.is_pr == 'true'
        env:
          PR_NUM: ${{ steps.ctx.outputs.pr_number }}
        run: |
          git fetch origin gh-pages --depth=1
          git worktree add /tmp/gh-pages origin/gh-pages
          rm -rf "/tmp/gh-pages/pr/${PR_NUM}"
          cp -r /tmp/pr-deploy/* /tmp/gh-pages/
          cd /tmp/gh-pages
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "deploy: PR #${PR_NUM} allure report" --allow-empty
          git push origin gh-pages
          cd "${{ github.workspace }}"
          git worktree remove /tmp/gh-pages --force 2>/dev/null || true

      # =========================================================================
      # Main: Full site deploy with per-build reports
      # =========================================================================

      - name: Inject report URL and commit info into history
        if: steps.ctx.outputs.is_main == 'true'
        env:
          REPORT_URL: ${{ env.PAGES_BASE_URL }}/${{ steps.ctx.outputs.ci_run_number }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
          RUN_NUMBER: ${{ steps.ctx.outputs.ci_run_number }}
        run: |
          if [ -f .allure-history.jsonl ]; then
            clojure -M -e "
              (require '[com.blockether.spel.ci :as ci])
              (ci/patch-allure-history!
                {:history-file \".allure-history.jsonl\"
                 :report-url   (System/getenv \"REPORT_URL\")
                 :commit-sha   (System/getenv \"COMMIT_SHA\")
                 :commit-msg   (System/getenv \"COMMIT_MSG\")
                 :run-number   (System/getenv \"RUN_NUMBER\")})"
          fi

      - name: Fetch existing site from gh-pages
        if: steps.ctx.outputs.is_main == 'true'
        run: |
          git fetch origin gh-pages --depth=1 || true
          mkdir -p gh-pages-site
          if git show origin/gh-pages:.nojekyll >/dev/null 2>&1; then
            git worktree add /tmp/gh-pages-checkout origin/gh-pages 2>/dev/null || true
            if [ -d /tmp/gh-pages-checkout ]; then
              for item in /tmp/gh-pages-checkout/*/; do
                dirname=$(basename "$item")
                if [[ "$dirname" =~ ^[0-9]+$ ]] || [ "$dirname" = "pr" ] || [ "$dirname" = "latest" ]; then
                  cp -r "$item" "gh-pages-site/$dirname"
                fi
              done
              for f in builds-meta.json builds-meta.jsonl builds.json pr-builds.json badge.svg .nojekyll; do
                [ -f "/tmp/gh-pages-checkout/$f" ] && cp "/tmp/gh-pages-checkout/$f" "gh-pages-site/$f"
              done
              git worktree remove /tmp/gh-pages-checkout --force 2>/dev/null || true
              echo "Restored $(ls -1d gh-pages-site/[0-9]* 2>/dev/null | wc -l) existing report(s)"

              # Prune stale PR directories — only keep PRs listed in pr-builds.json (up to MAX_PR_REPORTS)
              if [ -f "gh-pages-site/pr-builds.json" ] && [ -d "gh-pages-site/pr" ]; then
                ACTIVE_PRS=$(python3 -c "
          import json, sys
          data = json.load(open('gh-pages-site/pr-builds.json'))
          print(' '.join(str(b.get('pr_number','')) for b in data[:${MAX_PR_REPORTS}]))
          " 2>/dev/null || true)
                for pr_dir in gh-pages-site/pr/*/; do
                  [ -d "$pr_dir" ] || continue
                  pr_num=$(basename "$pr_dir")
                  if ! echo " $ACTIVE_PRS " | grep -q " $pr_num "; then
                    echo "Pruning stale PR directory: pr/$pr_num"
                    rm -rf "$pr_dir"
                  fi
                done
                echo "Kept PR directories: $ACTIVE_PRS"
              fi
            fi
          fi

      - name: Assemble site with per-build reports
        if: steps.ctx.outputs.is_main == 'true'
        env:
          RUN_NUMBER: ${{ steps.ctx.outputs.ci_run_number }}
          COMMIT_SHA: ${{ steps.ctx.outputs.head_sha }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
          COMMIT_AUTHOR: ${{ steps.commit.outputs.author }}
          COMMIT_TS: ${{ steps.commit.outputs.timestamp }}
          TEST_PASSED: ${{ steps.ctx.outputs.ci_passed }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.ctx.outputs.ci_run_id }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_BADGE: ${{ steps.version.outputs.badge }}
          TEST_COUNTS_PASSED: ${{ steps.test-counts.outputs.passed }}
          TEST_COUNTS_FAILED: ${{ steps.test-counts.outputs.failed }}
          TEST_COUNTS_BROKEN: ${{ steps.test-counts.outputs.broken }}
          TEST_COUNTS_SKIPPED: ${{ steps.test-counts.outputs.skipped }}
          TEST_COUNTS_TOTAL: ${{ steps.test-counts.outputs.total }}
        run: |
          RUN="${RUN_NUMBER}"
          mkdir -p gh-pages-site
          cp -r allure-report "gh-pages-site/${RUN}"
          echo "Added report #${RUN}"

          cd gh-pages-site

          DIRS=$(ls -1d [0-9]* 2>/dev/null | sort -n)
          COUNT=$(echo "$DIRS" | grep -c . || true)
          if [ "$COUNT" -gt "$MAX_REPORTS" ]; then
            REMOVE=$((COUNT - MAX_REPORTS))
            echo "$DIRS" | head -n "$REMOVE" | while read -r dir; do
              echo "Pruning old report: $dir"
              rm -rf "$dir"
            done
          fi

          [ -f "builds-meta.json" ] || echo '{}' > "builds-meta.json"
          cp ../resources/allure-index.html index.html
          cd ..

          clojure -M -e "
            (require '[com.blockether.spel.ci :as ci])
            (ci/generate-builds-metadata!
              {:site-dir       \"gh-pages-site\"
               :run-number     (System/getenv \"RUN_NUMBER\")
               :commit-sha     (System/getenv \"COMMIT_SHA\")
               :commit-msg     (System/getenv \"COMMIT_MSG\")
               :commit-author  (System/getenv \"COMMIT_AUTHOR\")
               :commit-ts      (System/getenv \"COMMIT_TS\")
               :tests-passed   (= \"true\" (System/getenv \"TEST_PASSED\"))
               :repo-url       (System/getenv \"REPO_URL\")
               :run-url        (System/getenv \"RUN_URL\")
               :version        (System/getenv \"VERSION\")
               :version-badge  (System/getenv \"VERSION_BADGE\")
               :test-counts    {:passed  (parse-long (or (System/getenv \"TEST_COUNTS_PASSED\") \"0\"))
                                :failed  (parse-long (or (System/getenv \"TEST_COUNTS_FAILED\") \"0\"))
                                :broken  (parse-long (or (System/getenv \"TEST_COUNTS_BROKEN\") \"0\"))
                                :skipped (parse-long (or (System/getenv \"TEST_COUNTS_SKIPPED\") \"0\"))
                                :total   (parse-long (or (System/getenv \"TEST_COUNTS_TOTAL\") \"0\"))}})
            (ci/patch-index-html!
              {:index-file \"gh-pages-site/index.html\"
               :logo-file  \"logo.svg\"
               :title      (System/getenv \"LANDING_TITLE\")
               :subtitle   (System/getenv \"LANDING_SUBTITLE\")})"
          cd gh-pages-site

          mkdir -p latest
          cat > latest/index.html <<EOF
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=../${RUN}/"></head><body></body></html>
          EOF

          if [ -f "${RUN}/badge.svg" ]; then
            cp "${RUN}/badge.svg" badge.svg
            echo "Copied badge.svg to site root"
          fi

          cd ..
          echo "Site ready with $(ls -1d gh-pages-site/[0-9]* 2>/dev/null | wc -l) reports"

      - name: Mark merged PRs
        if: steps.ctx.outputs.is_main == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f gh-pages-site/pr-builds.json ]; then
            MERGED=$(gh pr list --state merged --limit 50 --json number --jq '.[].number' | paste -sd, - 2>/dev/null || true)
            if [ -n "$MERGED" ]; then
              clojure -M -e "
                (require '[com.blockether.spel.ci :as ci])
                (ci/mark-prs-merged!
                  {:site-dir \"gh-pages-site\"
                   :merged-prs [${MERGED}]})"
            fi
          fi

      - name: Update PR check statuses
        if: steps.ctx.outputs.is_main == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f gh-pages-site/pr-builds.json ]; then
            FAILING=$(gh pr list --state open --limit 50 --json number,statusCheckRollup \
              --jq '[.[] | select(.statusCheckRollup | any(.conclusion == "FAILURE")) | .number] | join(",")' 2>/dev/null || true)
            if [ -n "$FAILING" ]; then
              clojure -M -e "
                (require '[com.blockether.spel.ci :as ci])
                (ci/update-pr-statuses!
                  {:site-dir \"gh-pages-site\"
                   :failing-prs [${FAILING}]})"
            fi
          fi

      - name: Cache Allure history
        if: steps.ctx.outputs.is_main == 'true'
        uses: actions/cache/save@v4
        with:
          path: .allure-history.jsonl
          key: allure-history-jsonl-${{ steps.ctx.outputs.ci_run_number }}

      - name: Deploy to GitHub Pages
        if: steps.ctx.outputs.is_main == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-site
          keep_files: false
