name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: spel-dev-linux-amd64
          - os: macos-latest
            artifact: spel-dev-macos-arm64
          - os: windows-latest
            artifact: spel-dev-windows-amd64

    runs-on: ${{ matrix.os }}
    name: CI (${{ matrix.os }})
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Normalize Playwright browsers path
        # Set PLAYWRIGHT_BROWSERS_PATH with proper $HOME expansion.
        # Job-level env: with ~ is literal and breaks JVM/Node subprocesses.
        # $GITHUB_ENV propagates to ALL subsequent steps and their subprocesses.
        run: echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright" >> "$GITHUB_ENV"

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - uses: clojure-lsp/setup-clojure-lsp@v1
        if: runner.os == 'Linux'
        with:
          clojure-lsp-version: 2025.11.28-12.47.43

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.58.0
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (Linux — with system deps)
        if: runner.os == 'Linux'
        run: clojure -M -e "(com.microsoft.playwright.CLI/main (into-array String [\"install\" \"--with-deps\"]))"

      - name: Install Playwright browsers
        if: runner.os != 'Linux'
        run: clojure -M -e "(com.microsoft.playwright.CLI/main (into-array String [\"install\"]))"

      - name: Check Clojure syntax
        run: clojure -M -e "(println \"Syntax check passed\")"

      - name: Lint (clojure-lsp)
        if: runner.os == 'Linux'
        run: make lint

      - name: Validate GraalVM native-image safety
        if: runner.os == 'Linux'
        run: make validate-safe-graal

      # =========================================================================
      # Tests — Linux runs with Allure reporter and uploads results as artifact.
      # macOS/Windows run plain tests (fail-fast, no Allure overhead).
      # =========================================================================

      - name: Clean Allure results
        if: runner.os == 'Linux'
        run: rm -rf allure-results allure-report

      - name: Run tests with Allure reporter (lazytest)
        id: tests-lazytest
        if: runner.os == 'Linux'
        env:
          LAZYTEST_ALLURE_GENERATE_REPORT: "false"
        run: clojure -M:test --output nested --output com.blockether.spel.allure-reporter/allure
        continue-on-error: true

      - name: Run clojure.test suite with Allure reporter
        id: tests-ct
        if: runner.os == 'Linux'
        env:
          ALLURE_CLOJURE_TEST_ENABLED: "true"
          ALLURE_CLOJURE_TEST_CLEAN: "false"
          ALLURE_CLOJURE_TEST_REPORT: "false"
        run: clojure -M:test-ct
        continue-on-error: true

      - name: Upload Allure results
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Fail if Linux tests failed
        if: runner.os == 'Linux' && (steps.tests-lazytest.outcome == 'failure' || steps.tests-ct.outcome == 'failure')
        run: |
          echo "::error::Tests failed (lazytest=${{ steps.tests-lazytest.outcome }}, clojure.test=${{ steps.tests-ct.outcome }})"
          exit 1

      - name: Run tests
        if: runner.os != 'Linux'
        run: clojure -M:test

      # =========================================================================
      # Build & smoke-test native image
      # =========================================================================

      - name: Build jar
        run: clojure -T:build jar

      - name: Build spel native image
        run: clojure -T:build native-image

      - name: CLI bash regression tests (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_BROWSERS_PATH"
          ls "$PLAYWRIGHT_BROWSERS_PATH/" 2>/dev/null | head -5 || echo 'WARNING: browser dir missing'
          chmod +x target/spel
          # Quick sanity: can the binary launch a browser and navigate?
          echo '--- Pre-flight: spel open (verbose) ---'
          target/spel --json open https://example.com 2>&1 | head -5 || true
          echo '--- Pre-flight: spel close ---'
          target/spel close 2>&1 || true
          echo '--- Running test-cli.sh ---'
          ./test-cli.sh ./target/spel

      - name: Dump daemon log (Unix)
        if: runner.os != 'Windows' && always()
        run: |
          echo '--- Daemon log (last 50 lines) ---'
          tail -50 /tmp/spel-default.log 2>/dev/null || echo 'No daemon log found'
          echo '--- Daemon log for testsession ---'
          tail -20 /tmp/spel-testsession.log 2>/dev/null || echo 'No testsession log'

      - name: CLI smoke tests (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x target/spel
          echo "=== spel --help ==="
          target/spel --help
          echo "=== spel version ==="
          target/spel version
          echo "=== spel open --help (per-command help) ==="
          target/spel open --help
          echo "=== spel snapshot --help ==="
          target/spel snapshot --help
          echo "=== spel find --help ==="
          target/spel find --help
          echo "=== spel network --help ==="
          target/spel network --help
          echo "=== spel -h (bare short flag) ==="
          target/spel -h
          echo "=== All CLI smoke tests passed ==="

      - name: CLI smoke tests (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "=== spel --help ==="
          target/spel.exe --help
          echo "=== spel version ==="
          target/spel.exe version
          echo "=== spel open --help (per-command help) ==="
          target/spel.exe open --help
          echo "=== spel snapshot --help ==="
          target/spel.exe snapshot --help
          echo "=== spel find --help ==="
          target/spel.exe find --help
          echo "=== spel network --help ==="
          target/spel.exe network --help
          echo "=== spel -h (bare short flag) ==="
          target/spel.exe -h
          echo "=== All CLI smoke tests passed ==="

      - name: Upload spel binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/spel

      - name: Upload spel binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/spel.exe
