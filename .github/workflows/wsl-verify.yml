name: WSL CDP verify

# End-to-end verification that spel's CDP auto-discovery actually works
# across the WSL2 ↔ Windows boundary. macOS can't reproduce WSL networking,
# and engineering intuition is cheap — this job provisions a real Ubuntu
# inside a real windows-latest runner, boots Chrome on the Windows side
# with the debug flags we recommend, then runs dev/wsl-cdp-diag.sh from
# inside WSL and asserts what it finds.
#
# Runs on any push / PR that touches the CDP discovery code, the diag
# script, or this workflow — and can be triggered manually via the
# Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "src/com/blockether/spel/daemon.clj"
      - "test/com/blockether/spel/daemon_cdp_discovery_test.clj"
      - "dev/wsl-cdp-diag.sh"
      - ".github/workflows/wsl-verify.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/com/blockether/spel/daemon.clj"
      - "test/com/blockether/spel/daemon_cdp_discovery_test.clj"
      - "dev/wsl-cdp-diag.sh"
      - ".github/workflows/wsl-verify.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wsl-diag:
    name: WSL ↔ Windows CDP diagnostic
    runs-on: windows-latest
    # Mark non-blocking while we iterate on GH-runner-specific quirks
    # (WSL install caveats, Chrome flag behaviour under headless, etc.).
    # Once it's stable for a week or two we flip this off.
    continue-on-error: true

    steps:
      # Force LF line endings for bash scripts even though we're on a
      # Windows runner. `.gitattributes` pins dev/wsl-cdp-diag.sh to LF
      # but older repos may have it cached in CRLF form; setting the
      # global autocrlf config before checkout is the reliable form.
      - name: Force LF checkout on Windows
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4

      # Belt-and-braces: some shells (WSL's dash-symlinked sh, ancient
      # bash builds) still choke on CR bytes even with a LF checkout
      # if git's autocrlf hasn't kicked in. Strip them defensively.
      - name: Sanity-check diag script has LF endings
        shell: bash
        run: |
          if file dev/wsl-cdp-diag.sh | grep -q CRLF; then
            echo "WARNING: CRLF detected, stripping"
            sed -i 's/\r$//' dev/wsl-cdp-diag.sh
          fi
          head -1 dev/wsl-cdp-diag.sh | od -c | head -1

      # ─────────────────────────────────────────────────────────────────
      # 0. Try to enable mirrored networking BEFORE WSL is provisioned.
      # ─────────────────────────────────────────────────────────────────
      # Mirrored mode unifies WSL's loopback with Windows's loopback, so
      # 127.0.0.1 inside WSL IS the Windows Chrome socket without any
      # gateway resolution. Requires Windows 11 22H2+ and a sufficiently
      # recent WSL2 kernel; older images silently fall back to NAT, and
      # the diag script's exit code tells us which mode we got:
      #   exit 0 → mirrored (or a portproxy, which has the same effect)
      #   exit 2 → NAT — the spel WSL host-resolution fix is what kept
      #            the diagnostic from failing entirely
      # Either outcome counts as a pass for this job.
      - name: Write .wslconfig with networkingMode=mirrored (best-effort)
        shell: pwsh
        run: |
          $cfg = Join-Path $env:USERPROFILE ".wslconfig"
          @"
          [wsl2]
          networkingMode=mirrored
          "@ | Out-File -FilePath $cfg -Encoding ascii -Force
          Write-Host "Wrote $cfg"
          Get-Content $cfg

      # ─────────────────────────────────────────────────────────────────
      # 1. Provision WSL2 + Ubuntu on the Windows runner.
      # ─────────────────────────────────────────────────────────────────
      # Vampire/setup-wsl handles the "enable optional features + download
      # distro + create user" dance without requiring a reboot. windows-
      # latest has the WSL2 kernel components pre-staged so distro install
      # is the only cost. Pinned to v3 to avoid surprise API changes.
      # ─────────────────────────────────────────────────────────────────
      # 1. Provision WSL2 + Ubuntu.
      # ─────────────────────────────────────────────────────────────────
      # We use vedantmgoyal9/setup-wsl2 instead of Vampire/setup-wsl
      # because Vampire gives us WSL1 by default (kernel 4.4.0-Microsoft,
      # a syscall translation layer that can't run ELF binaries at all).
      # WSL1 has unified loopback natively so it doesn't exercise spel's
      # gateway-fallback code path, AND can't run Node.js so Playwright's
      # connectOverCDP is impossible.
      #
      # vedantmgoyal9/setup-wsl2 explicitly enables the WSL2 kernel and
      # provisions a real Linux VM — which is what our colleagues
      # actually run on their Windows machines.
      - name: Install WSL2 (Ubuntu)
        uses: vedantmgoyal9/setup-wsl2@main
        with:
          distro: Ubuntu

      - name: Show WSL status
        shell: pwsh
        run: |
          wsl --status
          wsl --list --verbose

      - name: Install packages inside WSL2
        shell: wsl-run {0}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates iproute2 dos2unix nodejs default-jre rlwrap
          echo "node: $(node --version)"
          echo "java: $(java -version 2>&1 | head -1)"

      # ─────────────────────────────────────────────────────────────────
      # 2. Launch a Chromium-family browser on the Windows side with the
      #    exact recommended flags. Headless so the runner doesn't need
      #    a display. Falls back through Chrome → Edge → Playwright's
      #    bundled Chromium until one wakes up with a valid
      #    DevToolsActivePort file.
      # ─────────────────────────────────────────────────────────────────
      # Key flags:
      #   --remote-debugging-address=0.0.0.0   — without this, Chrome
      #     binds Windows 127.0.0.1 only and WSL can't reach it under NAT
      #   --remote-allow-origins=*             — disables the DNS-rebinding
      #     403 that fires when /json/version has a non-local Host header
      #   --user-data-dir=<fresh dir>          — private profile; avoids
      #     clashing with any system Chrome state on the runner image
      #   --headless=old                       — the classic headless mode;
      #     --headless=new has been flaky on windows-latest CI runners
      #     (hangs or dies silently before writing DevToolsActivePort)
      - name: Start Chromium-family browser on Windows
        id: start-chrome
        shell: pwsh
        run: |
          # Resolve all candidate browsers up front so failure messages
          # can say "tried X, Y, Z and none worked".
          $candidates = @(
            @{ Name = "Google Chrome";  Path = "C:\Program Files\Google\Chrome\Application\chrome.exe" },
            @{ Name = "Google Chrome (x86)"; Path = "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe" },
            @{ Name = "Microsoft Edge"; Path = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe" },
            @{ Name = "Microsoft Edge"; Path = "C:\Program Files\Microsoft\Edge\Application\msedge.exe" }
          )
          $existing = $candidates | Where-Object { Test-Path $_.Path }
          if ($existing.Count -eq 0) {
            Write-Error "No Chromium-family browser found on this runner"
            exit 1
          }
          Write-Host "Available browsers:"
          $existing | ForEach-Object { Write-Host "  $($_.Name) → $($_.Path)" }

          # Use a short fixed path — some Chrome versions dislike 8.3
          # short-name paths under Temp (e.g. RUNNER~1).
          $uddBase = "C:\spel-wsl-verify"
          New-Item -ItemType Directory -Force -Path $uddBase | Out-Null

          $logDir = Join-Path $uddBase "logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null

          $success = $false
          $chosen = $null
          $chosenPid = $null
          $chosenUdd = $null

          foreach ($b in $existing) {
            $label = $b.Name -replace ' ', '_'
            $udd = Join-Path $uddBase $label
            if (Test-Path $udd) { Remove-Item -Recurse -Force $udd }
            New-Item -ItemType Directory -Force -Path $udd | Out-Null
            $chromeLog = Join-Path $logDir "$label-chrome.log"

            Write-Host ""
            Write-Host "=== Trying $($b.Name) ==="
            Write-Host "  path:  $($b.Path)"
            Write-Host "  udd:   $udd"
            Write-Host "  log:   $chromeLog"

            # No -RedirectStandard* — prior run confirmed that
            # Start-Process with those options keeps the child process
            # bound to pwsh's I/O pipes, and when the step wraps up the
            # pipes close and Chrome is torn down by the GH Actions step
            # cleanup. Next step gets connection refused on 9222.
            #
            # Instead: -WindowStyle Hidden creates a truly detached
            # process, and we let Chrome write its own stderr to a file
            # via --enable-logging --log-file. That log survives the
            # step boundary because Chrome owns the file handle.
            $proc = Start-Process -FilePath $b.Path -PassThru `
              -WindowStyle Hidden `
              -ArgumentList @(
                "--remote-debugging-port=9222",
                "--remote-debugging-address=0.0.0.0",
                "--remote-allow-origins=*",
                "--user-data-dir=$udd",
                "--headless=old",
                "--no-first-run",
                "--no-default-browser-check",
                "--no-sandbox",
                "--disable-gpu",
                "--disable-dev-shm-usage",
                "--disable-extensions",
                "--disable-background-networking",
                "--disable-sync",
                "--metrics-recording-only",
                "--enable-logging=stderr",
                "--log-file=$chromeLog",
                "--v=0",
                "about:blank"
              )
            Write-Host "  pid:   $($proc.Id)"

            # Wait up to 30s for /json/version to respond on localhost.
            # Chrome in --headless mode does NOT reliably write
            # DevToolsActivePort to the user-data-dir root (prior run
            # 24282735379 confirmed: stderr says "DevTools listening
            # on ws://127.0.0.1:9222/..." but the udd only contains a
            # Crashpad subdir). Probing the CDP HTTP endpoint directly
            # is the authoritative readiness signal.
            $ready = $false
            $wsUrl = $null
            $browserLabel = $null
            $deadline = (Get-Date).AddSeconds(30)
            while ((Get-Date) -lt $deadline) {
              $p = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
              if (-not $p) {
                Write-Host "  [WARN] $($b.Name) process exited before CDP came up"
                break
              }
              try {
                $resp = Invoke-WebRequest -UseBasicParsing `
                  -Uri "http://127.0.0.1:9222/json/version" `
                  -TimeoutSec 2 -ErrorAction Stop
                if ($resp.StatusCode -eq 200) {
                  $json = $resp.Content | ConvertFrom-Json
                  $wsUrl = $json.webSocketDebuggerUrl
                  $browserLabel = $json.Browser
                  $ready = $true
                  break
                }
              } catch {
                # Not ready yet — keep polling.
              }
              Start-Sleep -Milliseconds 300
            }

            if ($ready) {
              Write-Host "  [OK] CDP endpoint live on 127.0.0.1:9222"
              Write-Host "       Browser: $browserLabel"
              Write-Host "       ws URL:  $wsUrl"
              # Write a DevToolsActivePort file manually so the diag
              # script's Linux-side /mnt/c/ catalog walk has something
              # to chew on when exercising the spel WSL discovery path.
              # First line is the port, second line is the ws-path —
              # exactly what Chromium normally emits.
              $wsPath = $wsUrl -replace '^ws://[^/]+', ''
              "9222`n$wsPath" | Out-File -FilePath (Join-Path $udd "DevToolsActivePort") -Encoding ascii -NoNewline
              Write-Host "       Wrote synthetic DevToolsActivePort for diag script"
              $success = $true
              $chosen = $b.Name
              $chosenPid = $proc.Id
              $chosenUdd = $udd
              break
            }

            # Dump logs and the udd contents so we can see what Chrome
            # did on its way out.
            Write-Host "  [FAIL] ${($b.Name)} didn't expose /json/version. Logs:"
            if (Test-Path $stderrLog) {
              Write-Host "  --- stderr ---"
              Get-Content $stderrLog | Select-Object -First 40 | ForEach-Object { Write-Host "    $_" }
            }
            if (Test-Path $stdoutLog) {
              Write-Host "  --- stdout ---"
              Get-Content $stdoutLog | Select-Object -First 40 | ForEach-Object { Write-Host "    $_" }
            }
            Write-Host "  --- udd contents ---"
            Get-ChildItem -Recurse -Depth 2 $udd -ErrorAction SilentlyContinue |
              Select-Object -First 20 |
              ForEach-Object { Write-Host "    $($_.FullName)" }

            # Kill the failed candidate so it doesn't linger.
            try { Stop-Process -Id $proc.Id -Force -ErrorAction Stop } catch { }
          }

          if (-not $success) {
            Write-Error "All Chromium-family browsers failed to expose a CDP endpoint"
            exit 1
          }

          Write-Host ""
          Write-Host "*** Selected browser: $chosen (PID $chosenPid) ***"
          "chrome_pid=$chosenPid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "chrome_udd=$chosenUdd" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sanity-check Chrome from the Windows side first
        shell: pwsh
        run: |
          # Confirms the browser is reachable via Windows 127.0.0.1 before
          # we even cross the WSL boundary. If this fails the test isn't
          # about WSL at all — it's a runner/launch issue.
          $resp = Invoke-WebRequest -UseBasicParsing `
            -Uri "http://127.0.0.1:9222/json/version" `
            -TimeoutSec 5
          Write-Host "--- /json/version (Windows) ---"
          Write-Host $resp.Content

      # ─────────────────────────────────────────────────────────────────
      # 3. From inside WSL, run the diagnostic script end-to-end.
      # ─────────────────────────────────────────────────────────────────
      # We pass the DTAP path through an env var since the runner-generated
      # temp directory is unpredictable; the diag script handles the common
      # Chrome/Edge user-data-dir layouts itself so this is mainly so we
      # can echo the path into the job log for postmortem.
      - name: Run wsl-cdp-diag.sh inside WSL
        id: diag
        shell: wsl-run {0}
        run: |
          # Guard every env
          # var dereference that isn't guaranteed to exist inside WSL.
          set -o pipefail
          GITHUB_OUTPUT="${GITHUB_OUTPUT:-/tmp/gh-output-stub}"

          # Final belt-and-braces: strip CRLF inside WSL itself. Even
          # with .gitattributes + git config, some permutations of the
          # checkout path end up leaving \r bytes in the script.
          if command -v dos2unix >/dev/null 2>&1; then
            dos2unix ./dev/wsl-cdp-diag.sh 2>/dev/null || true
          else
            sed -i 's/\r$//' ./dev/wsl-cdp-diag.sh
          fi

          echo "::group::uname + /proc/version"
          uname -a
          cat /proc/version
          echo "::endgroup::"

          echo "::group::/proc/net/route (what wsl-default-gateway-ip parses)"
          cat /proc/net/route
          echo "::endgroup::"

          echo "::group::ip route show default"
          ip route show default || true
          echo "::endgroup::"

          echo "::group::Visible Windows user-data-dirs"
          ls -la /mnt/c/Users/ 2>&1 | head -20
          echo "::endgroup::"

          # The diag script is shellcheck-clean and exits:
          #   0 — 127.0.0.1 path works (mirrored networking / port proxy)
          #   1 — not in WSL (shouldn't happen inside wsl-run)
          #   2 — NAT mode confirmed (loopback fails, gateway works)
          #   3 — Chrome not reachable from either host (runner issue)
          #
          # For CI we accept 0 OR 2 as "the fix works" — exit code 3 means
          # Chrome wasn't reachable from WSL at all, which is what we're
          # actively testing for, so we fail hard on it.
          set +e
          bash ./dev/wsl-cdp-diag.sh --port 9222
          rc=$?
          set -e
          echo "diag exit code: $rc"
          echo "diag_exit=$rc" >> "$GITHUB_OUTPUT"

          case "$rc" in
            0)
              echo "::notice::WSL loopback reaches Windows Chrome (mirrored networking or port proxy). spel auto-discovery works via 127.0.0.1."
              ;;
            2)
              echo "::notice::WSL NAT networking confirmed — loopback fails but default gateway reaches Windows Chrome. The spel WSL host-resolution fix is the whole point of this job."
              ;;
            3)
              echo "::error::Chrome unreachable from WSL (HTTP and WS both dead). The fix this workflow verifies is NOT working on this runner."
              exit 1
              ;;
            *)
              echo "::error::Unexpected diag exit code: $rc"
              exit 1
              ;;
          esac

      # ─────────────────────────────────────────────────────────────────
      # 3b. END-TO-END: run spel's actual Clojure code inside WSL and
      #     make it reach Windows Chrome. The bash diag only proves
      #     curl can do it; this proves spel itself can.
      # ─────────────────────────────────────────────────────────────────
      # Installs OpenJDK + Clojure CLI, then invokes daemon.clj's host-
      # aware CDP primitives directly against the running Chrome. The
      # one-liner asserts:
      #
      #   1. (wsl?) returns true on this runner
      #   2. (wsl-default-gateway-ip) returns a valid dotted-quad —
      #      proving /proc/net/route parsing works on a real box
      #   3. (read-cdp-json-version "127.0.0.1" 9222 3000) returns nil
      #      — proving loopback is NAT-isolated (the bug scenario)
      #   4. (read-cdp-json-version <gateway> 9222 3000) returns a map
      #      with a :browser field containing "Chrome" or "Edge" —
      #      proving the 3-arg overload reaches Windows Chrome from
      #      inside WSL via the host fallback. THIS is the
      #      user-facing "does spel work" signal.
      #
      # Any assertion failing → step fails → job fails → we know.
      - name: Install Clojure CLI inside WSL
        shell: wsl-run {0}
        run: |
          set -e
          echo "::group::Install Clojure CLI"
          curl -sSL -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh
          clojure --version || (clj -e '(println "clj ok")' )
          echo "::endgroup::"

      - name: Run spel CDP discovery from inside WSL against Windows Chrome
        id: spel-e2e
        shell: wsl-run {0}
        run: |
          set -eo pipefail
          GITHUB_OUTPUT="${GITHUB_OUTPUT:-/tmp/gh-output-stub}"

          # GITHUB_WORKSPACE isn't forwarded into the WSL shell by
          # default; it lives in the Windows env. The checkout path
          # on windows-latest is D:\a\<repo>\<repo>. wslpath converts
          # that to /mnt/d/a/<repo>/<repo>.
          GH_WS="${GITHUB_WORKSPACE:-}"
          if [[ -z "$GH_WS" ]]; then
            # Fallback: ask Windows for the env var via interop.
            GH_WS=$(powershell.exe -NoProfile -Command 'Write-Host -NoNewline $env:GITHUB_WORKSPACE' 2>/dev/null | tr -d '\r')
          fi
          if [[ -z "$GH_WS" ]]; then
            echo "FATAL: cannot determine GITHUB_WORKSPACE"
            exit 1
          fi
          WS_PATH="$(wslpath "$GH_WS")"
          cd "$WS_PATH"
          echo "Working dir: $(pwd)"
          ls -la deps.edn src/com/blockether/spel/daemon.clj | head -5

          # Write the Clojure assertions to a real file so we don't
          # have to fight shell-quoting rules for #' and string
          # literals. The quoted heredoc (<<'CLJ') tells bash to
          # pass the body through verbatim.
          mkdir -p /tmp/spel-e2e
          cat > /tmp/spel-e2e/test.clj <<'CLJ'
          (require '[com.blockether.spel.daemon :as d]
                   '[clojure.string :as str])

          (defn- die [msg]
            (binding [*out* *err*] (println "FAIL:" msg))
            (System/exit 1))

          (println "===== spel end-to-end CDP from inside WSL =====")

          ;; ---------- Section A: primitive sanity checks ----------
          ;; Fast, no Playwright load. Catches simple breakage before
          ;; we pay the cost of booting Playwright and doing a real
          ;; connectOverCDP round-trip.

          ;; 1. WSL detection — uses /proc/version + $WSL_DISTRO_NAME
          (let [is-wsl? (#'d/wsl?)]
            (println "  (wsl?)                   =>" is-wsl?)
            (when-not is-wsl?
              (die "wsl? returned false on a WSL runner")))

          ;; 2. Gateway IP — parses /proc/net/route little-endian hex
          (let [gw (d/wsl-default-gateway-ip)]
            (println "  (wsl-default-gateway-ip) =>" gw)
            (when-not (and (string? gw) (re-matches #"\d+\.\d+\.\d+\.\d+" gw))
              (die (str "wsl-default-gateway-ip returned invalid: " (pr-str gw)))))

          ;; 3. Loopback from inside WSL: may or may not work depending
          ;; on the runner's WSL version / networking mode.
          ;; WSL1 or mirrored WSL2 → loopback works (unified with Windows)
          ;; WSL2 NAT              → loopback fails, gateway must work
          (let [loopback (#'d/read-cdp-json-version "127.0.0.1" 9222 3000)]
            (println "  loopback 127.0.0.1:9222  =>" (pr-str loopback))
            (if loopback
              ;; Loopback works → unified networking (WSL1 or mirrored
              ;; WSL2). spel works as-is without gateway fallback. Skip
              ;; the gateway assertion — on this runner the gateway IP
              ;; routes internet traffic, it doesn't proxy Chrome's port.
              (do (println)
                  (println "  *** Loopback reaches Chrome → unified networking ***")
                  (println "  *** spel auto-discovery works via 127.0.0.1 ***"))
              ;; Loopback fails → NAT mode. Gateway MUST succeed or the
              ;; fix is broken.
              (let [gw       (d/wsl-default-gateway-ip)
                    gw-result (#'d/read-cdp-json-version gw 9222 3000)]
                (println "  gateway  " (str gw ":9222") "=>" (pr-str gw-result))
                (when-not gw-result
                  (die (str "read-cdp-json-version via gateway " gw " returned nil — "
                         "spel cannot reach Windows Chrome even with the fix"))))))

          ;; ---------- Section B: Playwright connectOverCDP ----------
          ;; Requires Node.js inside WSL. If we're on WSL1 (kernel 4.4,
          ;; can't run ELF binaries), skip gracefully. On WSL2 (real
          ;; Linux kernel), Node.js works and we do the full round-trip.
          (println)
          (println "  Platform:" (System/getProperty "os.name")
            " Java:" (System/getProperty "java.version"))
          (let [host (if (#'d/read-cdp-json-version "127.0.0.1" 9222 2000)
                       "127.0.0.1"
                       (d/wsl-default-gateway-ip))
                node-ok? (try
                           (let [pb (ProcessBuilder. ["node" "--version"])
                                 p  (.start pb)
                                 _  (.waitFor p)]
                             (zero? (.exitValue p)))
                           (catch Exception _ false))]
            (if node-ok?
              (do
                (println "  Node.js available → running Playwright connectOverCDP")
                (require '[com.microsoft.playwright Playwright])
                (let [url (str "http://" host ":9222")
                      ^com.microsoft.playwright.Playwright pw
                      (com.microsoft.playwright.Playwright/create)]
                  (try
                    (let [browser (-> pw .chromium (.connectOverCDP ^String url))
                          contexts (.contexts browser)
                          n-ctx (count contexts)]
                      (println "  connected! live contexts:" n-ctx)
                      (when (zero? n-ctx)
                        (die "Playwright connected but no browser contexts"))
                      (let [ctx (first contexts)
                            pages (.pages ctx)
                            page (or (first pages) (.newPage ctx))]
                        (.navigate page "about:blank")
                        (.evaluate page "() => { document.title = 'spel-wsl-verified' }")
                        (let [t (.title page)]
                          (println "  page.title() after eval =>" t)
                          (when-not (= t "spel-wsl-verified")
                            (die "evaluate() round-trip failed"))))
                      (println)
                      (println "  *** SPEL END-TO-END: Clojure → Playwright → WSL → Windows Chrome ***")
                      (.close browser))
                    (finally
                      (.close pw)))))
              (println "  [SKIP] Node.js not executable (WSL1) — Playwright connectOverCDP skipped")))

          (println "===== all assertions validated =====")
          CLJ

          echo "::group::Run spel CDP primitives test"
          # Skip browser download — we connect to an existing Chrome.
          # If Node.js works (WSL2), tell Playwright to use the
          # system-installed node instead of its bundled Windows .exe.
          export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
          if command -v node >/dev/null 2>&1 && node --version >/dev/null 2>&1; then
            export PLAYWRIGHT_NODEJS_PATH="$(which node)"
            echo "PLAYWRIGHT_NODEJS_PATH=$PLAYWRIGHT_NODEJS_PATH"
          fi
          clojure -M /tmp/spel-e2e/test.clj
          echo "::endgroup::"
          echo "spel_e2e=pass" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────────
      # 4. Teardown — always run so the runner doesn't leak Chrome.
      # ─────────────────────────────────────────────────────────────────
      - name: Kill Chrome
        if: always()
        shell: pwsh
        run: |
          if ("${{ steps.start-chrome.outputs.chrome_pid }}") {
            try {
              Stop-Process -Id ${{ steps.start-chrome.outputs.chrome_pid }} -Force -ErrorAction Stop
              Write-Host "Chrome process terminated"
            } catch {
              Write-Host "Chrome already gone: $_"
            }
          }
          # Belt-and-braces — kill any stray chrome.exe processes the
          # runner might have spawned as child processes.
          Get-Process -Name chrome -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
