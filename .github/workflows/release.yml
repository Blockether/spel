name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact: spel-linux-amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: spel-linux-arm64
          - os: macos-latest
            arch: arm64
            artifact: spel-macos-arm64
          - os: windows-latest
            arch: amd64
            artifact: spel-windows-amd64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.artifact }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Build uberjar
        run: clojure -T:build uberjar

      - name: Build native image
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            "$GRAALVM_HOME/bin/native-image.cmd" -jar target/spel-standalone.jar -o target/spel
          else
            native-image -jar target/spel-standalone.jar -o target/spel
          fi

      - name: CLI smoke tests (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x target/spel
          echo "=== spel --help ==="
          target/spel --help
          echo "=== spel version ==="
          target/spel version
          echo "=== spel open --help (per-command help) ==="
          target/spel open --help
          echo "=== spel snapshot --help ==="
          target/spel snapshot --help
          echo "=== spel find --help ==="
          target/spel find --help
          echo "=== spel network --help ==="
          target/spel network --help
          echo "=== All CLI smoke tests passed ==="

      - name: CLI smoke tests (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "=== spel --help ==="
          target/spel.exe --help
          echo "=== spel version ==="
          target/spel.exe version
          echo "=== spel open --help (per-command help) ==="
          target/spel.exe open --help
          echo "=== spel snapshot --help ==="
          target/spel.exe snapshot --help
          echo "=== spel find --help ==="
          target/spel.exe find --help
          echo "=== spel network --help ==="
          target/spel.exe network --help
          echo "=== All CLI smoke tests passed ==="

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/spel target/${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/spel.exe target/${{ matrix.artifact }}.exe

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.artifact }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.artifact }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Release & Deploy to Clojars

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      # --- Generate changelog (safe, read-only — do FIRST) ---
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $CURRENT_TAG)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${CURRENT_TAG})
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/Blockether/spel/compare/${PREV_TAG}...${CURRENT_TAG}"
          } > /tmp/release_body.md

      # --- GitHub Release with binaries (reversible — do before Clojars) ---
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Make Unix binaries executable
        run: |
          chmod +x artifacts/spel-linux-amd64/spel-linux-amd64 || true
          chmod +x artifacts/spel-linux-arm64/spel-linux-arm64 || true
          chmod +x artifacts/spel-macos-arm64/spel-macos-arm64 || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_body.md
          files: |
            artifacts/spel-linux-amd64/spel-linux-amd64
            artifacts/spel-linux-arm64/spel-linux-arm64
            artifacts/spel-macos-arm64/spel-macos-arm64
            artifacts/spel-windows-amd64/spel-windows-amd64.exe

      # --- Deploy to Clojars (irreversible — do LAST, with existence check) ---
      - name: Check if version exists on Clojars
        id: check-clojars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.clojars.org/com/blockether/spel/$VERSION/spel-$VERSION.jar")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already exists on Clojars — skipping deploy"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Deploy to Clojars
        if: steps.check-clojars.outputs.exists != 'true'
        env:
          VERSION: ${{ github.ref_name }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy

      # --- Update version files on main ---
      - name: Update README.md version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/{:mvn\/version \"[^\"]*\"}/{:mvn\/version \"$VERSION\"}/g" README.md

      - name: Update CHANGELOG.md
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}
          DATE=$(date +%Y-%m-%d)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" $CURRENT_TAG)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..${CURRENT_TAG})
          fi

          UNRELEASED_LINE=$(grep -n '^## \[Unreleased\]' CHANGELOG.md | head -1 | cut -d: -f1)

          if [ -z "$UNRELEASED_LINE" ]; then
            echo "ERROR: Could not find ## [Unreleased] section in CHANGELOG.md"
            exit 1
          fi

          {
            head -n "$UNRELEASED_LINE" CHANGELOG.md
            echo ""
            echo "## [$CURRENT_TAG] - $DATE"
            echo ""
            echo "### Changed"
            echo "$COMMITS"
            echo ""
            tail -n +$((UNRELEASED_LINE + 1)) CHANGELOG.md
          } > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md

          sed -i "s|\[Unreleased\]: .*|[Unreleased]: https://github.com/Blockether/spel/compare/${CURRENT_TAG}...HEAD|" CHANGELOG.md

          if ! grep -q "^\[${CURRENT_TAG}\]:" CHANGELOG.md; then
            echo "[$CURRENT_TAG]: https://github.com/Blockether/spel/releases/tag/${CURRENT_TAG}" >> CHANGELOG.md
          fi

      - name: Bump SPEL_VERSION to next patch
        run: |
          CURRENT="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "$NEXT_VERSION" > resources/SPEL_VERSION
          echo "Bumped SPEL_VERSION to $NEXT_VERSION"

      - name: Commit version updates
        run: |
          git config user.name "blockether-deployer"
          git config user.email "contact@blockether.com"
          git add README.md CHANGELOG.md resources/SPEL_VERSION
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "release: update version files for ${{ github.ref_name }}, bump to next dev version"
            git push origin main
          }
