name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  # Only linux-arm64 needs building — the other 3 binaries are reused from CI.
  build-arm64:
    runs-on: ubuntu-24.04-arm
    name: Build spel-linux-arm64
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-arm64-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-arm64-

      - name: Build uberjar
        run: clojure -T:build uberjar

      - name: Build native image
        run: native-image -jar target/spel-standalone.jar -o target/spel

      - name: CLI smoke tests
        run: |
          chmod +x target/spel
          echo "=== spel --help ==="
          target/spel --help
          echo "=== spel version ==="
          target/spel version
          echo "=== All CLI smoke tests passed ==="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spel-linux-arm64
          path: target/spel

  release:
    needs: build-arm64
    runs-on: ubuntu-latest
    name: Release & Deploy to Clojars

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      # --- Download linux-arm64 from this release build ---
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: spel-linux-arm64
          path: artifacts/spel-linux-arm64

      # --- Download 3 binaries from the CI run on the same commit ---
      - name: Download CI artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          echo "Looking for CI artifacts on commit $COMMIT_SHA"

          # Find the CI workflow run for this commit
          RUN_ID=$(gh run list --workflow=ci.yml --commit="$COMMIT_SHA" --status=success \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful CI run found for commit $COMMIT_SHA"
            echo "Make sure CI passes before tagging a release."
            exit 1
          fi

          echo "Found CI run: $RUN_ID"

          for ARTIFACT in spel-linux-amd64 spel-macos-arm64 spel-windows-amd64; do
            echo "Downloading $ARTIFACT from CI run $RUN_ID..."
            mkdir -p "artifacts/$ARTIFACT"
            gh run download "$RUN_ID" --name "$ARTIFACT" --dir "artifacts/$ARTIFACT"
          done

          echo "All CI artifacts downloaded successfully"
          ls -lR artifacts/

      # --- Generate changelog (safe, read-only — do FIRST) ---
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $CURRENT_TAG)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${CURRENT_TAG})
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/Blockether/spel/compare/${PREV_TAG}...${CURRENT_TAG}"
          } > /tmp/release_body.md

      # --- Rename binaries and set permissions ---
      - name: Prepare binaries
        run: |
          # CI uploads the binary as just 'spel' (or 'spel.exe') inside the artifact dir
          # Rename to the artifact name for the release
          for ARTIFACT in spel-linux-amd64 spel-linux-arm64 spel-macos-arm64; do
            if [ -f "artifacts/$ARTIFACT/spel" ]; then
              mv "artifacts/$ARTIFACT/spel" "artifacts/$ARTIFACT/$ARTIFACT"
            fi
            chmod +x "artifacts/$ARTIFACT/$ARTIFACT" 2>/dev/null || true
          done

          # Windows binary
          if [ -f "artifacts/spel-windows-amd64/spel.exe" ]; then
            mv "artifacts/spel-windows-amd64/spel.exe" "artifacts/spel-windows-amd64/spel-windows-amd64.exe"
          fi

          echo "=== Final artifact layout ==="
          ls -lR artifacts/

      # --- GitHub Release with binaries ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_body.md
          files: |
            artifacts/spel-linux-amd64/spel-linux-amd64
            artifacts/spel-linux-arm64/spel-linux-arm64
            artifacts/spel-macos-arm64/spel-macos-arm64
            artifacts/spel-windows-amd64/spel-windows-amd64.exe

      # --- Deploy to Clojars (irreversible — do LAST, with existence check) ---
      - name: Check if version exists on Clojars
        id: check-clojars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.clojars.org/com/blockether/spel/$VERSION/spel-$VERSION.jar")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already exists on Clojars — skipping deploy"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Deploy to Clojars
        if: steps.check-clojars.outputs.exists != 'true'
        env:
          VERSION: ${{ github.ref_name }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy

      # --- Update version files on main ---
      - name: Update README.md version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/{:mvn\/version \"[^\"]*\"}/{:mvn\/version \"$VERSION\"}/g" README.md

      - name: Update CHANGELOG.md
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}
          DATE=$(date +%Y-%m-%d)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" $CURRENT_TAG)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..${CURRENT_TAG})
          fi

          UNRELEASED_LINE=$(grep -n '^## \[Unreleased\]' CHANGELOG.md | head -1 | cut -d: -f1)

          if [ -z "$UNRELEASED_LINE" ]; then
            echo "ERROR: Could not find ## [Unreleased] section in CHANGELOG.md"
            exit 1
          fi

          {
            head -n "$UNRELEASED_LINE" CHANGELOG.md
            echo ""
            echo "## [$CURRENT_TAG] - $DATE"
            echo ""
            echo "### Changed"
            echo "$COMMITS"
            echo ""
            tail -n +$((UNRELEASED_LINE + 1)) CHANGELOG.md
          } > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md

          sed -i "s|\[Unreleased\]: .*|[Unreleased]: https://github.com/Blockether/spel/compare/${CURRENT_TAG}...HEAD|" CHANGELOG.md

          if ! grep -q "^\[${CURRENT_TAG}\]:" CHANGELOG.md; then
            echo "[$CURRENT_TAG]: https://github.com/Blockether/spel/releases/tag/${CURRENT_TAG}" >> CHANGELOG.md
          fi

      - name: Bump SPEL_VERSION to next patch
        run: |
          CURRENT="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "$NEXT_VERSION" > resources/SPEL_VERSION
          echo "Bumped SPEL_VERSION to $NEXT_VERSION"

      - name: Commit version updates
        run: |
          git config user.name "blockether-deployer"
          git config user.email "contact@blockether.com"
          git add README.md CHANGELOG.md resources/SPEL_VERSION
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "release: update version files for ${{ github.ref_name }}, bump to next dev version"
            git push origin main
          }
