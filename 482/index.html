<script id="spel-md-renderer">
(function(){
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function parseHttpTitle(line){
  var m=line.match(/^##\s+(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)\s+(.+?)\s*\u2192\s*(\d+)\s*(.*)$/);
  if(!m)return null;
  return{method:m[1],url:m[2],status:parseInt(m[3]),statusText:m[4].trim()}
}
function sectionType(heading){
  var h=heading.toLowerCase();
  if(h==='curl')return{type:'curl',label:'cURL'};
  if(/^request/.test(h))return{type:'req',label:heading};
  if(/^response/.test(h))return{type:'res',label:heading};
  return null;
}
function statusCls(code){
  if(code>=200&&code<300)return 's2xx';
  if(code>=300&&code<400)return 's3xx';
  if(code>=400&&code<500)return 's4xx';
  return 's5xx';
}
var cardIcon={req:'\u2191',res:'\u2193',curl:'\u2706'};
var cardTitle={req:'Request',res:'Response',curl:'cURL'};
function codeBlock(lang,code){
  return '<div class="code-wrap"><button class="copy-btn" onclick="spelCopy(this)">Copy</button>'+'<pre><code class="language-'+(lang||'text')+'">'+esc(code)+'</code></pre></div>';
}
function spelMd(s){
  var lines=s.split('\n'),tokens=[],inCode=false,codeLang='',codeLines=[];
  for(var i=0;i<lines.length;i++){
    var L=lines[i];
    if(!inCode&&/^```/.test(L)){inCode=true;codeLang=L.slice(3).trim();codeLines=[];continue}
    if(inCode){if(/^```/.test(L)){inCode=false;tokens.push({t:'code',lang:codeLang,text:codeLines.join('\n')});continue}codeLines.push(L);continue}
    if(/^---+$/.test(L)){tokens.push({t:'hr'});continue}
    var ht=(/^## /.test(L))?parseHttpTitle(L):null;
    if(ht){tokens.push({t:'http-title',d:ht});continue}
    if(/^## /.test(L)){tokens.push({t:'h2',text:L.slice(3)});continue}
    var sec=(/^### /.test(L))?sectionType(L.slice(4).trim()):null;
    if(sec){tokens.push({t:'section',sec:sec});continue}
    if(/^### /.test(L)){tokens.push({t:'h3',text:L.slice(4).trim()});continue}
    if(L.trim()==='')continue;
    var t=esc(L).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
    tokens.push({t:'p',text:t});
  }
  if(inCode){tokens.push({t:'code',lang:codeLang,text:codeLines.join('\n')})}
  var out=[],j=0,curCard=null;
  function openCard(type){
    if(curCard)out.push('</div></div>');
    curCard=type;
    out.push('<div class="http-card '+type+'">');
    out.push('<div class="card-hdr"><span class="card-icon">'+(cardIcon[type]||'')+'</span>'+cardTitle[type]+'</div>');
    out.push('<div class="card-body">');
  }
  function closeCard(){if(curCard){out.push('</div></div>');curCard=null}}
  while(j<tokens.length){
    var tk=tokens[j];
    if(tk.t==='http-title'){
      closeCard();
      out.push('<div class="http-title">');
      out.push('<span class="http-method '+tk.d.method.toLowerCase()+'">'+tk.d.method+'</span>');
      out.push('<span class="http-url">'+esc(tk.d.url)+'</span>');
      out.push('<span class="http-status '+statusCls(tk.d.status)+'">'+tk.d.status+' '+esc(tk.d.statusText)+'</span>');
      out.push('</div>');
    }else if(tk.t==='section'){
      var st=tk.sec.type;
      if(curCard!==st){closeCard();openCard(st)}
      out.push('<div class="http-section">');
      out.push('<div class="section-hdr">'+esc(tk.sec.label)+'</div>');
      j++;
      while(j<tokens.length&&tokens[j].t!=='section'&&tokens[j].t!=='http-title'&&tokens[j].t!=='hr'){
        var ct=tokens[j];
        if(ct.t==='code')out.push(codeBlock(ct.lang,ct.text));
        else if(ct.t==='p')out.push('<p>'+ct.text+'</p>');
        else if(ct.t==='h3')out.push('<h3>'+esc(ct.text)+'</h3>');
        j++;
      }
      out.push('</div>');
      continue;
    }else if(tk.t==='code'){closeCard();out.push(codeBlock(tk.lang,tk.text))}
    else if(tk.t==='hr'){closeCard();out.push('<hr>')}
    else if(tk.t==='h2'){closeCard();out.push('<h2>'+esc(tk.text)+'</h2>')}
    else if(tk.t==='h3'){closeCard();out.push('<h3>'+esc(tk.text)+'</h3>')}
    else if(tk.t==='p'){out.push('<p>'+tk.text+'</p>')}
    j++;
  }
  closeCard();
  return out.join('\n');
}
window.spelCopy=function(btn){
  var code=btn.parentElement.querySelector('code');
  if(!code)return;
  navigator.clipboard.writeText(code.textContent).then(function(){
    btn.textContent='Copied!';
    btn.classList.add('copied');
    setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied')},1500);
  });
};
var badgeMap={'[UI+API] ':{cls:'ui-api',label:'UI+API'},'[API] ':{cls:'api',label:'API'},'[UI] ':{cls:'ui',label:'UI'}};
function renderBadges(){
  document.querySelectorAll('[data-testid="test-result-step-title"]').forEach(function(el){
    if(el.dataset.spelBadge)return;
    var txt=el.textContent;
    for(var prefix in badgeMap){
      if(txt.indexOf(prefix)===0){
        el.dataset.spelBadge='1';
        var b=badgeMap[prefix];
        var span=document.createElement('span');
        span.className='spel-badge '+b.cls;
        span.textContent=b.label;
        var walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
        while(walker.nextNode()){
          var n=walker.currentNode;
          var idx=n.textContent.indexOf(prefix);
          if(idx>=0){
            var after=n.splitText(idx);
            after.textContent=after.textContent.slice(prefix.length);
            n.parentNode.insertBefore(span,after);
            break;
          }
        }
        break;
      }
    }
  });
}
function renderMd(){
  document.querySelectorAll('pre[data-testid="code-attachment-content"].language-md').forEach(function(pre){
    if(pre.dataset.spelRendered)return;
    pre.dataset.spelRendered='1';
    var code=pre.querySelector('code');
    if(!code)return;
    var div=document.createElement('div');
    div.className='spel-md';
    div.innerHTML=spelMd(code.textContent);
    pre.replaceWith(div);
  });
}
var obs=new MutationObserver(function(){renderMd();renderBadges()});
obs.observe(document.body,{childList:true,subtree:true});
setTimeout(function(){renderMd();renderBadges()},2000);
}());
